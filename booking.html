<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>預約 - 可莉兒 Hair Salon</title>

<link rel="stylesheet" href="style.css">

<style>
  main {
    max-width: 1000px;
    margin: 40px auto;
    padding: 0px 20px;
  }

  h1 {
    color: #4a7c53;
    margin-bottom: 20px;
    /* 預設靠左，已移除 text-align: center; */
  }

  form {
    background: #fff;
    padding: 20px 40px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    max-width: 500px;
    margin: 0 auto;
  }

  label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
    color: #4a7c53;
  }

  select, input {
    width: 100%;
    padding: 10px;
    margin-bottom: 20px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 1rem;
    box-sizing: border-box; /* 確保 padding 不會撐破容器 */
  }

  button[type="submit"] {
    background-color: #7bd8a2;
    border: none;
    color: white;
    padding: 12px 20px;
    border-radius: 6px;
    font-size: 1.1rem;
    cursor: pointer;
    transition: background-color 0.3s ease;
    width: 100%; /* 讓按鈕與輸入框同寬 */
  }

  button[type="submit"]:hover {
    background-color: #5bb174;
  }

  /* --- ▼▼▼ 預約成功彈窗樣式 ▼▼▼ --- */
  #successModal {
    display: none; /* 預設隱藏 */
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6); /* 半透明黑色背景 */
    z-index: 9999;
    justify-content: center; align-items: center;
    backdrop-filter: blur(3px);
  }
  .success-box {
    background: white; padding: 30px 20px; border-radius: 16px;
    text-align: center; max-width: 90%; width: 320px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    animation: popIn 0.3s ease-out;
  }
  @keyframes popIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .line-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: #06c755; color: white;
    text-decoration: none; padding: 12px 20px; border-radius: 50px;
    font-weight: bold; margin: 15px 0; font-size: 1rem;
    box-shadow: 0 4px 10px rgba(6, 199, 85, 0.3);
    transition: transform 0.1s;
  }
  .line-btn:active { transform: scale(0.95); }
  
  .close-text-btn {
    background: none; border: none; color: #999; 
    text-decoration: underline; cursor: pointer; font-size: 0.9rem;
  }
</style>
</head>
<body>

<div id="navbar-placeholder"></div>

<main>
  <h1>線上預約</h1>
  <form id="booking-form">

    <div style="
        background-color: #fff5f5; 
        color: #c0392b; 
        padding: 12px; 
        border-radius: 6px; 
        border: 1px solid #ffcccc; 
        text-align: center; 
        font-weight: bold; 
        margin-bottom: 20px; 
        font-size: 0.95rem;">
        ⚠️ 溫馨提醒：為確保服務品質<br>請務必提前 3 天預約
    </div>

    <label for="service">服務項目</label>
    <select id="service" name="service" required>
      <option value="" disabled selected>請選擇服務</option>
      <option value="剪髮">剪髮（約1小時）</option>
      <option value="洗髮">洗髮（約1小時）</option>
      <option value="燙髮">燙髮（約1小時）</option>
      <option value="染髮">染髮（約1小時）</option>
    </select>
    
    <label for="date">日期</label>
    <input type="date" id="date" name="date" required />
    
    <label for="time">時間</label>
    <select id="time" name="time" required>
      <option value="" disabled selected>請選擇時間</option>
      </select>
    
    <label for="name">姓名</label>
    <input type="text" id="name" name="name" placeholder="請輸入姓名" required />
    
    <label for="phone">電話</label>
    <input type="tel" id="phone" name="phone" placeholder="請輸入電話" required />
    
    <button type="submit">送出預約</button>
  </form>
</main>

<div id="footer-placeholder"></div>

<div id="successModal">
  <div class="success-box">
    <div style="width:60px; height:60px; background:#e8f5e9; border-radius:50%; margin:0 auto 15px; display:flex; align-items:center; justify-content:center;">
      <span style="font-size:32px; color:#4CAF50;">✔</span>
    </div>

    <h2 style="color:#4a7c53; margin:0 0 10px 0;">預約送出成功！</h2>
    
    <p style="color:#555; font-size: 0.95rem; line-height: 1.6; text-align: left; padding: 0 10px;">
      我們會盡快確認您的預約。<br>
      <span style="color:#d9534f; font-weight:bold;">⚠️ 重要步驟</span><br>
      請點擊下方按鈕，並按下<b>「傳送」</b>，這樣我們才能知道您的 LINE 帳號，以免漏接通知！
    </p>
    
    <a href="#" target="_blank" class="line-btn" id="lineBtn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M20.2 9.8c0-4.6-4.5-8.3-10-8.3S0.2 5.2 0.2 9.8c0 4.1 3.6 7.5 8.4 8.2.3.1.8.2.9.5l-0.3 1.9c-0.1 0.5-0.5 1.2 1.1 0.6 0 0 5.8-3.4 8.1-5.9 1.1-1.3 1.8-2.9 1.8-4.6z"/></svg>
      點我傳送身分確認
    </a>
    
    <button class="close-text-btn" onclick="document.getElementById('successModal').style.display='none'">
      我已經傳過了，關閉
    </button>
  </div>
</div>

<script src="navbar.js"></script>
<script src="footer.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  // 您的 GAS 網址 (維持不變)
  const LINE_API_URL = "https://script.google.com/macros/s/AKfycbybkCC_yZqT0BFjoKWmCP-bUoK47RANacxOurbSerctNUeSgpwx7Y4Hmk05-faucQ0BxQ/exec";
  
  const firebaseConfig = {
    apiKey: "AIzaSyCfxDOOzTLbmQRfvW275hJrtOnX_t-6-yc",
    authDomain: "hsinformation.firebaseapp.com",
    projectId: "hsinformation",
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const bookingForm = document.getElementById('booking-form');
  const dateInput = document.getElementById('date');
  const timeSelect = document.getElementById('time');
  const allTimes = ["10:00","11:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00"];

  const today = new Date();
  const year = today.getFullYear();
  const month = String(today.getMonth() + 1).padStart(2, '0');
  const day = String(today.getDate()).padStart(2, '0');
  const todayString = `${year}-${month}-${day}`;

  dateInput.min = todayString;

  dateInput.addEventListener('change', async () => {
    const selectedDate = dateInput.value;
    if (!selectedDate) return;

    const snapshot = await db.collection('appointments')
      .where('date', '==', selectedDate)
      .get();
    const bookedTimes = snapshot.docs.map(doc => doc.data().time);

    const now = new Date();
    const currentHour = now.getHours();
    const isToday = (selectedDate === todayString);

    timeSelect.innerHTML = '<option value="" disabled selected>請選擇時間</option>';

    allTimes.forEach(time => {
      const option = document.createElement('option');
      option.value = time;
      
      const timeHour = parseInt(time.split(':')[0]);
      const isPastTime = isToday && (timeHour <= currentHour);
      const isBooked = bookedTimes.includes(time);

      if (isPastTime) {
        option.textContent = `${time} (已超過時間)`;
        option.disabled = true;
        option.style.color = '#ccc';
      } else if (isBooked) {
        option.textContent = `${time} (已被預約)`;
        option.disabled = true;
        option.style.color = '#ccc';
      } else {
        option.textContent = time;
      }

      timeSelect.appendChild(option);
    });
  });

  // --- 送出預約 ---
  bookingForm.addEventListener('submit', async e => {
    e.preventDefault();

    const service = document.getElementById('service').value;
    const date = document.getElementById('date').value;
    const time = document.getElementById('time').value;
    const name = document.getElementById('name').value;
    const phone = document.getElementById('phone').value;
    
    const submitBtn = bookingForm.querySelector('button');
    submitBtn.disabled = true;
    submitBtn.textContent = "處理中...";

    try {
        const snapshot = await db.collection('appointments')
          .where('date', '==', date)
          .where('time', '==', time)
          .get();

        if (!snapshot.empty) {
          alert("❌ 此時間剛剛已被搶走，請選擇其他時段");
          submitBtn.disabled = false;
          submitBtn.textContent = "送出預約";
          return;
        }

        await db.collection('appointments').add({
          memberName: name,
          memberId: phone,
          service: service,
          date: date,
          time: time,
          status: '已預約',
          note: '',
          createdAt: new Date()
        });

        const msg = `【新預約通知】\n📅 日期: ${date}\n⏰ 時間: ${time}\n👤 客戶: ${name}\n📞 電話: ${phone}\n💇 項目: ${service}`;
        
        fetch(LINE_API_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({ message: msg }),
          headers: { 'Content-Type': 'application/json' }
        }).catch(err => console.error('LINE 通知失敗', err));

        // ★★★ 4. 關鍵修改：動態生成「帶名字的」LINE 連結 ★★★
        
        // 取得客人剛剛填的名字
        const userName = document.getElementById('name').value;
        
        // 組合訊息： "你好，我是 [名字]，我剛預約了！請確認"
        // 使用 encodeURIComponent 處理中文，避免連結壞掉
        const lineMessage = `你好，我是 ${userName}，我剛預約了！請確認。`;
        const lineUrl = `https://line.me/R/oaMessage/@491xwhjb/?${encodeURIComponent(lineMessage)}`;
        
        // 把這個連結塞進按鈕裡
        document.getElementById('lineBtn').href = lineUrl;

        // 顯示彈窗
        document.getElementById('successModal').style.display = 'flex';
        
        bookingForm.reset();
        timeSelect.innerHTML = '<option value="" disabled selected>請選擇時間</option>';

    } catch (error) {
        console.error(error);
        alert("發生錯誤，請稍後再試");
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "送出預約";
    }
  });
</script>

</body>
</html>
