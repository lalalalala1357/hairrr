<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>行事曆管理 - 可莉兒 Hair Salon</title>
<link rel="stylesheet" href="admin-style.css">
<style>
#controls { text-align:center; margin:15px 0; display: flex; justify-content: center; align-items: center; gap: 8px;}
#monthLabel { font-weight:bold; font-size: 1.1rem; min-width: 100px; display: inline-block;}
button.ctrl-btn { margin:0; padding:6px 12px; background:#7bd8a2; border:none; color:#fff; border-radius:4px; cursor:pointer; }
button.ctrl-btn:hover { background:#5bb174; }
#calendar { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; max-width:800px; margin:0 auto; padding: 0 4px; }
.week-cell { text-align:center; padding:8px 0; background:#e0f2e9; font-weight:bold; font-size: 0.9rem; border-radius: 4px; color: #4a7c53;}
.calendar-cell { background:#fff; cursor:pointer; position:relative; border:1px solid #ddd; border-radius: 5px; display: flex; flex-direction: column; align-items: center; transition: background 0.1s;}
.calendar-cell.is-today { background: var(--today-bg); border: 2px solid #ffc107; }
.calendar-cell:active { background: #eee; } 
.date-num { font-weight: bold; margin-top: 4px; }
.label-container { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 2px; margin-top: 2px; }
@media (min-width: 601px) {
  .calendar-cell { min-height: 85px; }
  .label { font-size: 0.75rem; color:#fff; padding: 2px 6px; border-radius: 10px; width: 85%; text-align: center; white-space: nowrap; overflow: hidden; }
}
@media (max-width: 600px) {
  .calendar-cell { min-height: 60px; padding-bottom: 2px; }
  .date-num { font-size: 0.9rem; margin-top: 3px; }
  .label-container { flex-direction: row; justify-content: center; gap: 3px; flex-wrap: wrap; }
  .label { width: 20px; height: 20px; font-size: 11px; font-weight: bold; color: #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; padding: 0; }
}
#modalOverlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:99; }
#appointmentModal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; width: 90%; max-width:400px; max-height: 85vh; overflow-y: auto; border-radius:8px; padding:20px; z-index:100; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
.modal-header { display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #ddd; padding-bottom:10px; margin-bottom:10px; }
.close-btn { background:none; border:none; font-size:1.8rem; color:#666; cursor:pointer; line-height: 1;}
.apptRow { background: #fcfcfc; border: 1px solid #eee; border-radius: 6px; padding:10px; margin-bottom: 8px; }
.apptInfo { font-size: 1rem; margin-bottom: 5px; }
.apptBtnGroup { display:flex; gap:8px; margin-top:8px; }
.apptBtnGroup button { flex: 1; padding:8px 0; border:none; border-radius:4px; font-weight:bold; cursor:pointer; font-size: 0.9rem; }
.btn-done { background:#5cb85c; color:#fff; }
.btn-cancel { background:#ff5c5c; color:#fff; }
.btn-del { background:#eee; color:#333; }
#newApptForm { margin-top: 15px; padding-top:15px; border-top:1px solid #eee; display: flex; flex-direction: column; gap: 10px;}
#newApptForm input, #newApptForm select { padding:10px; border:1px solid #ccc; border-radius:4px; font-size:16px; width: 100%; box-sizing: border-box;}
#addApptBtn { padding:12px; background:#3399ff; color:#fff; border:none; border-radius:6px; font-weight:bold; font-size:16px; cursor:pointer; width: 100%; }
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="admin-navbar-placeholder"></div>

<main>
  <h1>行事曆管理</h1>
  <div id="controls">
    <button id="prevMonth" class="ctrl-btn">&lt;</button>
    <span id="monthLabel"></span>
    <button id="nextMonth" class="ctrl-btn">&gt;</button>
    <button id="refreshBtn" class="ctrl-btn" style="background:#3399ff;">↻</button>
  </div>
  <div id="calendar"></div>
</main>

<div id="modalOverlay"></div>
<div id="appointmentModal">
  <div class="modal-header">
    <h3 id="modalDate" style="margin:0"></h3>
    <button class="close-btn" onclick="closeModal()">×</button>
  </div>
  <div id="modalContent"></div>
  <div id="newApptForm">
    <h4 style="margin:0;">快速預約</h4>
    <input type="text" id="newName" placeholder="姓名">
    <input type="tel" id="newPhone" placeholder="電話">
    <div style="display:flex; gap:10px;">
      <select id="newTime"></select>
      <select id="newService">
        <option value="剪髮">剪髮</option>
        <option value="洗髮">洗髮</option>
        <option value="燙髮">燙髮</option>
        <option value="染髮">染髮</option>
        <option value="護髮">護髮</option>
      </select>
    </div>
    <button id="addApptBtn">確認新增</button>
  </div>
</div>

<script src="admin-navbar.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCfxDOOzTLbmQRfvW275hJrtOnX_t-6-yc",
  authDomain: "hsinformation.firebaseapp.com",
  projectId: "hsinformation"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let appointments = {};
let today = new Date();
let currentYear = today.getFullYear();
let currentMonth = today.getMonth();
let selectedDay = '';
const weekDays = ['日','一','二','三','四','五','六'];
const LINE_API_URL = "https://script.google.com/macros/s/AKfycbzS0CAd3OX2iNJ3kqt8kx3bvCYe7-MPSdeXPtkXA-mjrR6lUJELJX3A0EH-KDRkJoPKaQ/exec";

// 🚀 取消舊版密碼鎖，直接載入行事曆資料 (因為 navbar 已經鎖住了)
loadAppointments(currentYear, currentMonth);

async function loadAppointments(year, month){
  document.getElementById('monthLabel').textContent = "讀取中...";
  const start = `${year}-${String(month+1).padStart(2,'0')}-01`;
  const end = `${year}-${String(month+1).padStart(2,'0')}-31`;
  try {
    const snapshot = await db.collection('appointments').where('date', '>=', start).where('date', '<=', end).get();
    appointments = {};
    snapshot.forEach(doc=>{
        const data = doc.data();
        if(!appointments[data.date]) appointments[data.date]=[];
        appointments[data.date].push({...data, id: doc.id});
    });
    buildCalendar(year, month);
  } catch (error) { alert("讀取失敗"); }
}

function buildCalendar(year, month){
  const calendar = document.getElementById('calendar');
  calendar.innerHTML='';
  document.getElementById('monthLabel').textContent=`${year} 年 ${month+1} 月`;

  weekDays.forEach(d=>{
    const cell=document.createElement('div');
    cell.classList.add('week-cell'); cell.textContent=d; calendar.appendChild(cell);
  });

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startWeek = firstDay.getDay(); 
  const totalDays = lastDay.getDate();
  const todayStr = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}-${String(new Date().getDate()).padStart(2,'0')}`;

  for(let i=0; i<startWeek; i++){
    const cell=document.createElement('div');
    cell.classList.add('calendar-cell'); cell.style.background='#fcfcfc'; cell.style.border='none'; calendar.appendChild(cell);
  }

  for(let d=1; d<=totalDays; d++){
    const dayStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cell=document.createElement('div');
    cell.classList.add('calendar-cell');
    if(dayStr === todayStr) cell.classList.add('is-today');

    const dateNum = document.createElement('div');
    dateNum.classList.add('date-num'); dateNum.textContent = d; cell.appendChild(dateNum);

    const dayAppts = appointments[dayStr] || [];
    const labelContainer = document.createElement('div');
    labelContainer.classList.add('label-container');

    if(dayAppts.length > 0){
      const completedCount = dayAppts.filter(a=>a.status==='已完成').length;
      const pendingCount = dayAppts.filter(a=>a.status==='已預約').length;

      if(pendingCount>0){
        const label = document.createElement('div');
        label.classList.add('label'); label.style.background='#ff5c5c';
        label.textContent = window.innerWidth > 600 ? `${pendingCount} 預約` : pendingCount;
        labelContainer.appendChild(label);
      }
      if(completedCount>0){
        const label = document.createElement('div');
        label.classList.add('label'); label.style.background='#5cb85c';
        label.textContent = window.innerWidth > 600 ? `${completedCount} 完成` : completedCount;
        labelContainer.appendChild(label);
      }
    }
    cell.appendChild(labelContainer);
    cell.addEventListener('click', ()=>manageDay(dayStr));
    calendar.appendChild(cell);
  }
}

function manageDay(dayStr){
  selectedDay = dayStr;
  let dayAppointments = appointments[dayStr] || [];
  dayAppointments.sort((a, b) => a.time.localeCompare(b.time));

  const modal = document.getElementById('appointmentModal');
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');
  document.getElementById('modalDate').textContent = `📅 ${dayStr}`;
  content.innerHTML='';

  if(dayAppointments.length === 0) content.innerHTML = '<div style="text-align:center;padding:15px;color:#999">無預約</div>';

  dayAppointments.forEach((a)=>{ 
    const row = document.createElement('div'); row.classList.add('apptRow');
    row.innerHTML = `
      <div class="apptInfo">
        <b>${a.time}</b> <span style="font-size:1.05rem; font-weight:bold; margin-left: 5px;">${a.memberName}</span>
        <span style="color:#666; font-size:0.95rem; margin-left: 8px;">${a.memberId}</span>
        <span style="color:#666; font-size:0.9rem; margin-left: 5px;">(${a.service})</span>
        <div style="font-size:0.85rem; color:#888; margin-top:4px;">狀態: ${a.status}</div>
      </div>
    `;

    const btnGroup = document.createElement('div'); btnGroup.classList.add('apptBtnGroup');
    if(a.status !== '已完成' && a.status !== '已取消') {
        const btnDone = document.createElement('button'); btnDone.textContent='完成'; btnDone.className = 'btn-done'; btnDone.onclick = ()=>updateAppointmentStatus(a.id, '已完成'); btnGroup.appendChild(btnDone);
        const btnCancel = document.createElement('button'); btnCancel.textContent='取消'; btnCancel.className = 'btn-cancel'; btnCancel.onclick = ()=>updateAppointmentStatus(a.id, '已取消'); btnGroup.appendChild(btnCancel);
    }
    const btnDelete = document.createElement('button'); btnDelete.textContent='刪除'; btnDelete.className = 'btn-del'; btnDelete.onclick = ()=>deleteAppointment(a.id); btnGroup.appendChild(btnDelete);
    row.appendChild(btnGroup); content.appendChild(row);
  });

  populateTimeSelect();
  document.getElementById('newName').value=''; document.getElementById('newPhone').value='';
  overlay.style.display='block'; modal.style.display='block';
}

function closeModal(){ document.getElementById('appointmentModal').style.display='none'; document.getElementById('modalOverlay').style.display='none'; }
async function updateAppointmentStatus(apptId, newStatus){ await db.collection('appointments').doc(apptId).update({ status: newStatus }); closeModal(); loadAppointments(currentYear,currentMonth); }
async function deleteAppointment(apptId){ if(!confirm("確定刪除？")) return; await db.collection('appointments').doc(apptId).delete(); closeModal(); loadAppointments(currentYear,currentMonth); }

document.getElementById('addApptBtn').addEventListener('click', async ()=>{
  const name = document.getElementById('newName').value.trim(); const phone = document.getElementById('newPhone').value.trim();
  const time = document.getElementById('newTime').value; const service = document.getElementById('newService').value;
  if(!name || !phone){ alert('請填寫完整'); return; }
  
  const btn = document.getElementById('addApptBtn'); btn.disabled = true; btn.textContent = "處理中...";
  try {
      await db.collection('appointments').add({ memberId: phone, memberName: name, service: service, date: selectedDay, time: time, status: '已預約', createdAt: new Date() });
      const msg = `【新預約通知】\n📅 日期: ${selectedDay}\n⏰ 時間: ${time}\n👤 客戶: ${name}\n📞 電話: ${phone}\n💇 項目: ${service}`;
      fetch(LINE_API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ message: msg }), headers: { 'Content-Type': 'application/json' } }).catch(e => console.error(e));
      closeModal(); loadAppointments(currentYear, currentMonth); alert('預約成功！LINE 通知已發送');
  } catch(e) { console.error(e); alert("錯誤: " + e.message); } finally { btn.disabled = false; btn.textContent = "確認新增"; }
});

function populateTimeSelect(){
  const select = document.getElementById('newTime'); select.innerHTML='';
  for(let h=10; h<=20; h++){
    const t = String(h).padStart(2,'0'); select.appendChild(new Option(`${t}:00`, `${t}:00`));
    if(h!==20) select.appendChild(new Option(`${t}:30`, `${t}:30`));
  }
}

document.getElementById('modalOverlay').addEventListener('click', closeModal);
document.getElementById('prevMonth').addEventListener('click', ()=>{ currentMonth--; if(currentMonth<0){ currentMonth=11; currentYear--; } loadAppointments(currentYear,currentMonth); });
document.getElementById('nextMonth').addEventListener('click', ()=>{ currentMonth++; if(currentMonth>11){ currentMonth=0; currentYear++; } loadAppointments(currentYear,currentMonth); });
document.getElementById('refreshBtn').addEventListener('click', ()=>{ loadAppointments(currentYear,currentMonth); });
window.addEventListener('resize', ()=>{ clearTimeout(window.resizeTimer); window.resizeTimer = setTimeout(()=>{ buildCalendar(currentYear, currentMonth); }, 200); });
</script>
</body>
</html>
