<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>關於我們 - 可莉兒 Hair Salon</title>

<link rel="stylesheet" href="style.css">

<style>
  main { max-width:900px; margin:40px auto; padding:0 20px; }
  
  /* 🌟 把這裡的 text-align: center; 拿掉，標題就會恢復靠左對齊了！ */
  h1, h2 { color:#4a7c53; margin-bottom:20px; }
  
  /* 內文預設就會靠左，維持這樣即可 */
  .intro { font-size:1.1rem; line-height:1.8; margin-bottom:40px; }
  
  .team { display:grid; gap:20px; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); }
  
  /* 🌟 設計師卡片保持置中，畫面比較好看 */
  .member { background:#fff; border-radius:10px; padding:20px; box-shadow:0 2px 6px rgba(0,0,0,0.1); text-align:center; }
  .member img { width:120px; height:120px; border-radius:50%; object-fit:cover; margin-bottom:15px; }
  .member h3 { margin:10px 0 5px; color:#4a7c53; }
  .member p { font-size:0.9rem; color:#555; }
</style>
</head>
<body>

<div id="navbar-placeholder"></div>

<main>
  <h1>關於我們</h1>
  <p class="intro">
    可莉兒 Hair Salon 致力於打造 <strong>自然、簡約又時尚</strong> 的美髮體驗。<br>
    我們相信每一個人都擁有最適合自己的風格，<br>
    透過專業設計師的巧手，讓每位顧客都能展現自信與美麗。
  </p>

  <h2>品牌理念</h2>
  <p class="intro">
    💇‍♀️ 專業技術｜不斷進修，掌握最新髮型趨勢 <br>
    🌿 自然質感｜重視髮質保養，追求健康與美感平衡 <br>
    🤝 貼心服務｜細心傾聽需求，打造專屬於你的造型
  </p>

  <h2>設計師</h2>
  <div class="team">
    <div class="member">
      <img src="images/stylist1.png" alt="設計師">
      <h3>Amy</h3>
      <p>擅長日系剪髮與質感燙髮，風格清新自然。</p>
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>

<script src="navbar.js"></script>
<script src="footer.js"></script>

</body>
</html>
