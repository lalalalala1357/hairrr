<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>聯絡我們 - 可莉兒 Hair Salon</title>

<link rel="stylesheet" href="style.css">

<style>
  main { max-width:800px; margin:40px auto; padding:0 20px; }
  
  /* 標題靠左對齊 (已經移除了 text-align: center) */
  h1, h2 { color:#4a7c53; margin-bottom:20px; }

  .contact-info { background:#d0f0d6; padding:20px; border-radius:8px; margin-bottom:30px; font-size:1.05rem; color:#2e5530; }
  .contact-info a { color:#2e5530; text-decoration:none; font-weight:bold; }

  iframe { width:100%; height:320px; border:0; border-radius:8px; margin-bottom:30px; }

  form { 
    background:#fff; 
    padding:20px 40px; 
    border-radius:8px; 
    box-shadow:0 2px 8px rgba(0,0,0,0.1); 
    max-width:500px; 
    margin:0 auto; 
  }
  label { display:block; margin-bottom:8px; font-weight:bold; color:#4a7c53; }
  input, textarea {
    width:100%; padding:10px; margin-bottom:20px;
    border:1px solid #ccc; border-radius:6px; font-size:1rem; resize:vertical;
    box-sizing: border-box; /* 確保 padding 不會撐破容器 */
  }
  button[type="submit"] {
    background-color:#7bd8a2; border:none; color:white; padding:12px 20px;
    border-radius:6px; font-size:1.1rem; cursor:pointer; transition:background-color .3s; width: 100%;
  }
  button[type="submit"]:hover { background-color:#5bb174; }
</style>
</head>
<body>

<div id="navbar-placeholder"></div>

<main>
  <h1>聯絡我們</h1>

  <div class="contact-info">
    <p>📍 地址：<a href="https://maps.google.com/?q=514彰化縣溪湖鎮二溪路一段329巷30號" target="_blank">514 彰化縣溪湖鎮二溪路一段329巷30號</a></p>
    <p>📞 電話：<a href="tel:0988528051">0988-528-051</a></p>
    <p>📧 電子郵件：<a href="mailto:clear20200921@gmail.com">clear20200921@gmail.com</a></p>
  </div>

  <iframe src="https://www.google.com/maps?q=514彰化縣溪湖鎮二溪路一段329巷30號&output=embed" allowfullscreen="" loading="lazy"></iframe>

  <h2>留言給我們</h2>
  <form id="contact-form">
    <label for="contact-name">姓名</label>
    <input type="text" id="contact-name" name="name" placeholder="請輸入您的姓名" required />
    
    <label for="contact-email">電話或電子郵件</label>
    <input type="text" id="contact-info" name="contact" placeholder="請輸入電話或電子郵件" required />
    
    <label for="contact-message">留言內容</label>
    <textarea id="contact-message" name="message" rows="5" placeholder="請輸入留言" required></textarea>
    
    <button type="submit">送出留言</button>
  </form>
</main>

<div id="footer-placeholder"></div>

<script src="navbar.js"></script>
<script src="footer.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  // ---------------- Firebase 初始化 ----------------
  const firebaseConfig = {
    apiKey: "AIzaSyCfxDOOzTLbmQRfvW275hJrtOnX_t-6-yc",
    authDomain: "hsinformation.firebaseapp.com",
    projectId: "hsinformation",
    storageBucket: "hsinformation.firebasestorage.app",
    messagingSenderId: "245515525647",
    appId: "1:245515525647:web:00bf24514009bddd02cd7a",
    measurementId: "G-DG6Z64PHF6"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const contactForm = document.getElementById('contact-form');

  contactForm.addEventListener('submit', async e => {
    e.preventDefault();

    const name = document.getElementById('contact-name').value;
    const contact = document.getElementById('contact-info').value.trim();
    const message = document.getElementById('contact-message').value;

    const phonePattern = /^09\d{8}$/; // 台灣手機格式
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; // Email格式

    if (!phonePattern.test(contact) && !emailPattern.test(contact)) {
      alert("請輸入有效的電話號碼或 Email！");
      return;
    }

    try {
      await db.collection('messages').add({
        name: name,
        contact: contact,
        message: message,
        createdAt: new Date()
      });
      alert('✅ 謝謝您的留言，我們會盡快與您聯絡！');
      contactForm.reset();
    } catch (error) {
      console.error(error);
      alert('❌ 送出失敗，請稍後再試');
    }
  });
</script>

</body>
</html>
