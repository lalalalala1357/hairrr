<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>產品上架管理 - 可莉兒 Hair Salon</title>

<link rel="stylesheet" href="admin-style.css">

<style>
/* 產品頁面專用內容區塊 */
.admin-card {
  background: #fff;
  padding: 30px;
  border-radius: 8px;
  box-shadow: 0 1px 5px rgba(0,0,0,0.1); 
}

label { display: block; margin-bottom: 8px; font-weight: bold; color: #4a7c53; }

input[type="text"], input[type="number"], textarea {
  width: 100%; padding: 12px; margin-bottom: 20px;
  border: 1px solid #ddd; border-radius: 6px; font-size: 16px; box-sizing: border-box;
}

.image-upload-area {
  background: #f9f9f9; border: 2px dashed #a8e6cf; border-radius: 6px;
  padding: 20px; text-align: center; margin-bottom: 20px; cursor: pointer;
}

#preview {
  max-width: 100%; max-height: 200px; display: none;
  margin: 15px auto 0; border-radius: 4px;
}

button.submit-btn {
  background-color: #4a7c53; 
  border: none; color: white;
  padding: 14px; border-radius: 6px; font-size: 1.1rem; font-weight: bold;
  cursor: pointer; width: 100%; transition: background 0.3s;
}
button.submit-btn:hover { background-color: #3d6645; }

/* 下方產品清單管理 */
.list-title { color: #4a7c53; margin: 50px 0 20px; } /* 已移除置中，隨大標題靠左 */

.admin-product-item {
  background: white;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 1px 5px rgba(0,0,0,0.1);
}

.product-info-mini { display: flex; align-items: center; }
.product-info-mini img {
  width: 50px; height: 50px; object-fit: cover; border-radius: 4px; margin-right: 12px;
}

.delete-btn {
  background: #ff6666; 
  color: #fff; border: none; 
  padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;
}
.delete-btn:hover { background: #ff4d4d; }
</style>
</head>
<body>

<div id="admin-navbar-placeholder"></div>

<main>
  <h1 class="page-title">產品上架管理</h1>
  
  <div class="admin-card">
    <div class="image-upload-area" onclick="document.getElementById('fileBtn').click()">
      <label style="cursor: pointer; color: #4a7c53; margin-bottom: 0;">📷 點擊選擇產品照片</label>
      <input type="file" id="fileBtn" accept="image/*" style="display: none;">
      <img id="preview" src="" alt="預覽圖">
    </div>

    <label>產品名稱</label>
    <input type="text" id="pName" placeholder="例如：護髮精油">
    
    <label>價格 (元)</label>
    <input type="number" id="pPrice" placeholder="請輸入純數字">
    
    <label>產品描述</label>
    <textarea id="pDesc" rows="4" placeholder="輸入產品特色..."></textarea>
    
    <button id="uploadBtn" class="submit-btn" onclick="processAndUpload()">確認上架發布</button>
  </div>

  <h2 class="list-title">目前上架中的產品</h2>
  <div id="adminProductList">
    <p style="text-align:left; color:#999;">載入中...</p>
  </div>
</main>

<script src="admin-navbar.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCfxDOOzTLbmQRfvW275hJrtOnX_t-6-yc",
    authDomain: "hsinformation.firebaseapp.com",
    projectId: "hsinformation",
  };
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }
  const db = firebase.firestore();

  document.getElementById('fileBtn').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = document.getElementById('preview');
        img.src = e.target.result;
        img.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
  });

  function processAndUpload() {
    const fileInput = document.getElementById('fileBtn');
    const name = document.getElementById('pName').value;
    const price = document.getElementById('pPrice').value;
    const desc = document.getElementById('pDesc').value;
    const btn = document.getElementById('uploadBtn');

    if (!fileInput.files[0] || !name || !price) {
      alert("⚠️ 請填寫名稱、價格並選擇照片！");
      return;
    }

    btn.disabled = true;
    btn.innerText = "上傳中...";

    const reader = new FileReader();
    reader.onload = function(event) {
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;
        const MAX_WIDTH = 600;
        if (width > MAX_WIDTH) {
          height *= MAX_WIDTH / width;
          width = MAX_WIDTH;
        }
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);

        db.collection('products').add({
          name: name,
          price: Number(price),
          description: desc,
          imageUrl: dataUrl,
          createdAt: new Date()
        }).then(() => {
          alert("🎉 產品上架成功！");
          location.reload(); 
        }).catch(e => {
          alert("上傳失敗");
          btn.disabled = false;
        });
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(fileInput.files[0]);
  }

  function loadProducts() {
    const listContainer = document.getElementById('adminProductList');
    db.collection('products').orderBy('createdAt', 'desc').onSnapshot((querySnapshot) => {
      listContainer.innerHTML = '';
      if (querySnapshot.empty) {
        listContainer.innerHTML = '<p style="text-align:left; color:#999;">目前沒有產品。</p>';
        return;
      }
      querySnapshot.forEach((doc) => {
        const p = doc.data();
        const id = doc.id;
        const html = `
          <div class="admin-product-item">
            <div class="product-info-mini">
              <img src="${p.imageUrl}">
              <div>
                <strong>${p.name}</strong><br>
                <small style="color:#e74c3c;">NT$ ${p.price}</small>
              </div>
            </div>
            <button class="delete-btn" onclick="deleteProduct('${id}', '${p.name}')">🗑️ 刪除</button>
          </div>
        `;
        listContainer.innerHTML += html;
      });
    });
  }

  function deleteProduct(id, name) {
    if (confirm(`確定要刪除「${name}」嗎？`)) {
      db.collection('products').doc(id).delete().then(() => {
        alert("已成功刪除！");
      });
    }
  }

  window.onload = loadProducts;
</script>
</body>
</html>
