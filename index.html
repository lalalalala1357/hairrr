<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>可莉兒 Hair Salon｜溪湖剪髮・染髮・燙髮</title>

<meta name="description" content="可莉兒 Hair Salon｜彰化溪湖專業美髮沙龍，提供剪髮、染髮、燙髮、護髮與造型設計。立即線上預約，打造專屬魅力造型。">
<meta name="keywords" content="溪湖美髮, 溪湖剪髮, 溪湖染髮, 溪湖燙髮, 可莉兒 Hair Salon">

<link rel="stylesheet" href="style.css">

<style>
  /* 公告橫幅 */
  #banner {
    width: 100vw;
    left: 50%;
    margin-left: -50vw;
    background: #ffe08a;
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    padding: 12px 16px;
    box-sizing: border-box;
    text-align: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  #banner span { flex:1; }
  #banner button {
    position: absolute;
    right: 16px;
    background: #4a7c53;
    color: #fff;
    border: none;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
  }

  main { max-width:900px; margin:40px auto; padding:0 20px; }
  h1, h2 { color:#4a7c53; margin-bottom:20px; } /* 標題預設靠左 */

  /* 手機版首頁標題換行 */
  .title-br { display: none; }
  @media (max-width: 768px) {
    .title-br { display: inline; }
    h1 { font-size: 32px; line-height: 1.3; }
  }

  /* 浮動按鈕 - 與價目表統一 */
  .fab {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background:#4a7c53;
    color:#fff;
    text-decoration: none; /* 移除底線 */
    border:none;
    border-radius:50px;
    padding:15px 20px;
    font-size:16px;
    cursor:pointer;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    z-index: 1000;
  }
  .fab:hover { background:#3b5f40; }
</style>
</head>
<body>

<div id="navbar-placeholder"></div>

<div id="banner">
  <span id="bannerText">載入中...</span>
  <button onclick="this.parentElement.style.display='none'">關閉</button>
</div>

<main>
  <h1>歡迎來到<span class="title-br"><br></span>可莉兒Hair Salon</h1>
  <p>我們提供專業的剪髮、染髮、燙髮與護髮服務，讓你擁有自信與魅力。</p>
  <p>想要預約？滑動上方目錄至「預約」即可線上完成！</p>
</main>

<div id="footer-placeholder"></div>

<a href="tel:0988528051" class="fab">📞 立即預約</a>

<script src="navbar.js"></script>
<script src="footer.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCfxDOOzTLbmQRfvW275hJrtOnX_t-6-yc",
    authDomain: "hsinformation.firebaseapp.com",
    projectId: "hsinformation"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const bannerSpan = document.getElementById("bannerText");

  async function loadBanner(){
    const doc = await db.collection("banner").doc("main").get();
    if(doc.exists){
      const data = doc.data();
      bannerSpan.textContent = data.title ? `${data.title}｜${data.content}` : data.content;
    } else {
      bannerSpan.textContent = "目前沒有公告";
    }
  }

  loadBanner();
</script>

</body>
</html>
